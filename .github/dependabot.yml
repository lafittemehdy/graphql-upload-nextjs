version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
      semver-major-days: 7
      semver-minor-days: 2
      semver-patch-days: 2
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"
    versioning-strategy: "increase"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/examples/example-graphql-upload-nextjs"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 2
      semver-major-days: 7
      semver-minor-days: 2
      semver-patch-days: 2
    commit-message:
      prefix: "build(deps)"
    labels:
      - "dependencies"
    versioning-strategy: "increase"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
