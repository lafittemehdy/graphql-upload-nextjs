name: Bug report
description: Report a reproducible problem.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.
  - type: input
    id: package-version
    attributes:
      label: Package version
      placeholder: 2.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Include Node.js, Next.js, Apollo Server, and package manager versions.
      placeholder: Node 22, Next 16, Apollo Server 5, npm 10
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Link to a minimal reproduction or paste the smallest request/schema/resolver example that shows the issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
